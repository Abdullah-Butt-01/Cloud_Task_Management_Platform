name: Build and Push Docker Image

on:
  push:
    branches:
      - main

jobs:

  build:

    runs-on: ubuntu-latest

    steps:

    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Login to DockerHub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build Docker Image
      run: docker build -t ${{ secrets.DOCKER_USERNAME }}/task-platform:latest .

    - name: Push Docker Image
      run: docker push ${{ secrets.DOCKER_USERNAME }}/task-platform:latest

  deploy:

    needs: build
    runs-on: ubuntu-latest

    steps:
    - name: Deploy to VM via SSH
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.SERVER_IP }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.DEPLOY_KEY }}
        port: 22
        timeout: 60s
        command_timeout: 10m
        debug: true
        script: |
          echo "Key exists check"
          set -e
          set -x

          echo "===== CONNECTED TO VM ====="
          whoami
          hostname
          pwd

          echo "===== FILES IN HOME ====="
          ls -la

          echo "===== ENTER PROJECT ====="
          cd task-platform-devops || exit 1

          echo "===== PROJECT FILES ====="
          ls -la

          echo "===== DOCKER STATUS ====="
          docker ps

          echo "===== PULL IMAGE ====="
          docker compose pull

          echo "===== STOP OLD CONTAINERS ====="
          docker compose down

          echo "===== START NEW CONTAINERS ====="
          docker compose up -d

          echo "===== FINAL STATUS ====="
          docker ps
