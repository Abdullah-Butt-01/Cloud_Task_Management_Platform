version: "3.9"

services: # everything inside this are containers

  api:
    build: .
    container_name: task-api
    ports:
      - "5000:5000"
    environment:
      - DATABASE_URL=postgresql://postgres:password@db:5432/tasks
      - REDIS_HOST=redis
    depends_on: # start db and redis before api
      - db
      - redis

  worker:
    build: .
    container_name: task-worker
    command: python -m app.worker
    environment:
      - REDIS_HOST=redis
    depends_on:
      - redis

  db:
    image: postgres:13 # ready made image
    container_name: postgres-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: tasks
    volumes: # data will store outside the container (even is container stops). Persists.
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: redis-cache

volumes:
  postgres_data:
